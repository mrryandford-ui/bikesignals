<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>CamNet</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#090910">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CamNet">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div class="home-page">
    <div class="home-logo">
      <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 108 108' width='72' height='72'>
        <circle cx='44' cy='54' r='20' fill='#3B82F6'/>
        <circle cx='44' cy='54' r='15' fill='#090910'/>
        <circle cx='44' cy='54' r='9'  fill='#3B82F6'/>
        <circle cx='44' cy='54' r='4'  fill='#090910'/>
        <path d='M28,43 Q33,36 41,39 Q36,45 34,51 Z' fill='#FFFFFF' fill-opacity='0.45'/>
        <path d='M67,41 A26,26,0,0,1,67,67' stroke='#FFFFFF' stroke-width='4.5' stroke-linecap='round' fill='none'/>
        <path d='M71,39 A31,31,0,0,1,71,69' stroke='#FFFFFF' stroke-width='4.5' stroke-linecap='round' fill='none'/>
        <path d='M75,36 A36,36,0,0,1,75,72' stroke='#FFFFFF' stroke-width='4.5' stroke-linecap='round' fill='none'/>
      </svg>
    </div>
    <h1 class="home-title">CamNet</h1>
    <p class="home-sub">Multi-phone camera monitor</p>

    <div class="home-cards">
      <a href="/viewer.html" class="role-card viewer">
        <div class="role-icon">🖥️</div>
        <div>
          <h2>Monitor</h2>
          <p>Watch multiple camera feeds</p>
        </div>
        <span class="role-arrow">›</span>
      </a>

      <a href="/camera.html" class="role-card camera">
        <div class="role-icon">📷</div>
        <div>
          <h2>Camera</h2>
          <p>Stream your camera to a session</p>
        </div>
        <span class="role-arrow">›</span>
      </a>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
    // If opened with ?room=XXXX, go straight to camera join
    const params = new URLSearchParams(location.search);
    if (params.get('room')) {
      location.href = '/camera.html?room=' + encodeURIComponent(params.get('room'));
    }
  </script>
</body>
</html>
