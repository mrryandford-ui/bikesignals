name: Build CamNet APK

on:
  push:
    branches: [main, 'claude/*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform & build tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install Gradle 8.2.1
        run: |
          mkdir -p /tmp/gradle
          curl -fSL https://services.gradle.org/distributions/gradle-8.2.1-bin.zip \
            -o /tmp/gradle/gradle.zip
          unzip -q -d /tmp/gradle /tmp/gradle/gradle.zip
          echo "/tmp/gradle/gradle-8.2.1/bin" >> $GITHUB_PATH

      - name: Restore cached signing keystore
        id: keystore-cache
        uses: actions/cache@v4
        with:
          path: android/app/camnet-debug.jks
          key: camnet-debug-keystore-v1

      - name: Generate keystore (first run only)
        if: steps.keystore-cache.outputs.cache-hit != 'true'
        run: |
          keytool -genkey -v \
            -keystore android/app/camnet-debug.jks \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -alias camnet \
            -dname "CN=CamNet,O=CamNet,C=US" \
            -storepass camnet-debug \
            -keypass camnet-debug

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Set version from run number
        run: |
          sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"1.${{ github.run_number }}\"/" android/app/build.gradle

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: camnet-camera-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
